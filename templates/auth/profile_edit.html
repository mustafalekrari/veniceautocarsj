{% extends 'base.html' %}
{% block title %}Mon Profil - Venice Autocars{% endblock %}

{% block content %}
<section class="py-10 max-w-2xl mx-auto px-4">
  <div class="mb-6">
    <a href="{% url 'client_dashboard' %}" class="text-gray-400 hover:text-gold-400 text-sm transition-colors">
      <i class="fas fa-arrow-left mr-1"></i>Retour à mon espace
    </a>
    <h1 class="text-3xl font-black text-white mt-3">Mon <span class="text-gold-400">Profil</span></h1>
  </div>

  <div class="bg-dark-800 rounded-2xl border border-gray-800 p-8">
    <form method="POST" class="space-y-5">
      {% csrf_token %}
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-400 text-sm mb-2">Prénom</label>
          <input type="text" name="first_name" value="{{ request.user.first_name }}"
            class="w-full px-4 py-3 bg-dark-700 border border-gray-600 rounded-xl text-white text-sm focus:border-yellow-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-2">Nom</label>
          <input type="text" name="last_name" value="{{ request.user.last_name }}"
            class="w-full px-4 py-3 bg-dark-700 border border-gray-600 rounded-xl text-white text-sm focus:border-yellow-500 focus:outline-none">
        </div>
      </div>
      <div>
        <label class="block text-gray-400 text-sm mb-2">Email</label>
        <input type="email" value="{{ request.user.email }}" disabled
          class="w-full px-4 py-3 bg-dark-900 border border-gray-700 rounded-xl text-gray-500 text-sm cursor-not-allowed">
        <p class="text-gray-600 text-xs mt-1">L'email ne peut pas être modifié.</p>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-400 text-sm mb-2">Téléphone</label>
          <input type="tel" name="phone" value="{{ profile.phone }}"
            class="w-full px-4 py-3 bg-dark-700 border border-gray-600 rounded-xl text-white text-sm focus:border-yellow-500 focus:outline-none"
            placeholder="+212 6 00 00 00 00">
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-2">Ville</label>
          <select name="city" class="w-full px-4 py-3 bg-dark-700 border border-gray-600 rounded-xl text-white text-sm focus:border-yellow-500 focus:outline-none">
            <option value="">-- Sélectionner --</option>
            {% for city in cities %}
            <option value="{{ city }}" {% if profile.city == city %}selected{% endif %}>{{ city }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div>
        <label class="block text-gray-400 text-sm mb-2">Adresse complète</label>
        <textarea name="address" rows="2"
          class="w-full px-4 py-3 bg-dark-700 border border-gray-600 rounded-xl text-white text-sm focus:border-yellow-500 focus:outline-none resize-none"
          placeholder="Votre adresse au Maroc">{{ profile.address }}</textarea>
      </div>
      <div>
        <label class="block text-gray-400 text-sm mb-2">N° CIN</label>
        <input type="text" name="cin" value="{{ profile.cin }}"
          class="w-full px-4 py-3 bg-dark-700 border border-gray-600 rounded-xl text-white text-sm focus:border-yellow-500 focus:outline-none"
          placeholder="AB123456">
      </div>
      <button type="submit" class="w-full py-3 rounded-xl font-bold text-gray-900 text-sm"
        style="background: linear-gradient(135deg, #D4AF37, #C9A227);">
        <i class="fas fa-save mr-2"></i>Enregistrer les modifications
      </button>
    </form>
  </div>
</section>
{% endblock %}
