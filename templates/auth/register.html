<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Venice Autocars Maroc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gold-gradient { background: linear-gradient(135deg, #D4AF37, #C9A227); }
    .bg-pattern { background-color: #0a0a0f; }
    .input-field { width:100%; padding: 0.7rem 1rem 0.7rem 2.75rem; background: #1a1a2e; border: 1px solid #374151; border-radius: 0.75rem; color: white; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
    .input-field:focus { border-color: #D4AF37; }
    .input-field::placeholder { color: #6b7280; }
    .input-no-icon { padding-left: 1rem; }
  </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center py-8 px-4">

  <div class="w-full max-w-2xl">
    <!-- Header -->
    <div class="text-center mb-8">
      <a href="{% url 'home' %}" class="inline-block mb-4">
        <img src="/static/images/logo.jpg" alt="Venice Autocars"
          style="height:75px;width:auto;border-radius:12px;margin:0 auto;">
      </a>
      <h2 class="text-white font-bold text-2xl">Créer votre compte</h2>
      <p class="text-gray-400 text-sm mt-1">Rejoignez des milliers de clients au Maroc</p>
    </div>

    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-8 shadow-2xl">

      {% if messages %}
      {% for message in messages %}
      <div class="mb-5 px-4 py-3 rounded-xl text-sm flex items-center gap-2
        {% if message.tags == 'error' %}bg-red-500/10 border border-red-500/30 text-red-400
        {% else %}bg-green-500/10 border border-green-500/30 text-green-400{% endif %}">
        <i class="fas fa-exclamation-circle"></i>{{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="POST" class="space-y-5">
        {% csrf_token %}

        <!-- Nom & Prénom -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-400 text-sm mb-2">Prénom <span class="text-red-400">*</span></label>
            <div class="relative">
              <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="text" name="first_name" required class="input-field" placeholder="Mohammed">
            </div>
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-2">Nom <span class="text-red-400">*</span></label>
            <div class="relative">
              <i class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="text" name="last_name" required class="input-field" placeholder="Alami">
            </div>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-gray-400 text-sm mb-2">Email <span class="text-red-400">*</span></label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="email" name="email" required class="input-field" placeholder="mohammed@exemple.ma">
          </div>
        </div>

        <!-- Téléphone & Ville -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-400 text-sm mb-2">Téléphone</label>
            <div class="relative">
              <i class="fas fa-phone absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="tel" name="phone" class="input-field" placeholder="+212 6 00 00 00 00">
            </div>
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-2">Ville</label>
            <div class="relative">
              <i class="fas fa-map-marker-alt absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <select name="city" class="input-field appearance-none cursor-pointer">
                <option value="">-- Sélectionner --</option>
                {% for city in cities %}
                <option value="{{ city }}">{{ city }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </div>

        <!-- CIN -->
        <div>
          <label class="block text-gray-400 text-sm mb-2">N° CIN <span class="text-gray-500 text-xs">(optionnel)</span></label>
          <div class="relative">
            <i class="fas fa-id-card absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" name="cin" class="input-field" placeholder="AB123456">
          </div>
        </div>

        <!-- Mots de passe -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-400 text-sm mb-2">Mot de passe <span class="text-red-400">*</span></label>
            <div class="relative">
              <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="password" name="password1" id="pw1" required class="input-field pr-10" placeholder="Min. 6 caractères">
              <button type="button" onclick="togglePw('pw1','eye1')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                <i class="fas fa-eye text-sm" id="eye1"></i>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-2">Confirmer <span class="text-red-400">*</span></label>
            <div class="relative">
              <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="password" name="password2" id="pw2" required class="input-field pr-10" placeholder="Répéter le mot de passe">
              <button type="button" onclick="togglePw('pw2','eye2')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
                <i class="fas fa-eye text-sm" id="eye2"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- CGU -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="cgu" required class="mt-1 w-4 h-4 accent-yellow-500 flex-shrink-0">
          <label for="cgu" class="text-gray-400 text-sm">
            J'accepte les <a href="#" class="text-yellow-400 hover:underline">conditions d'utilisation</a> et la
            <a href="#" class="text-yellow-400 hover:underline">politique de confidentialité</a>
          </label>
        </div>

        <button type="submit" class="w-full py-3 rounded-xl font-bold text-gray-900 text-sm transition-all hover:opacity-90 active:scale-95"
          style="background: linear-gradient(135deg, #D4AF37, #C9A227);">
          <i class="fas fa-user-plus mr-2"></i>Créer mon compte
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-400 text-sm">
          Déjà un compte ?
          <a href="{% url 'login' %}" class="font-semibold hover:underline" style="color:#D4AF37">Se connecter</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
