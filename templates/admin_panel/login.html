<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin - Venice Autocars</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gold-gradient { background: linear-gradient(135deg, #D4AF37, #C9A227); }
  </style>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-8 shadow-2xl">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="/" class="inline-block mb-3">
          <img src="/static/images/logo.jpg" alt="Venice Autocars"
            style="height:70px;width:auto;border-radius:10px;margin:0 auto;">
        </a>
        <p class="text-gray-400 text-sm mt-2">Espace Administrateur</p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm flex items-center gap-2">
        <i class="fas fa-exclamation-circle"></i>{{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-gray-400 text-sm mb-2">Nom d'utilisateur</label>
          <div class="relative">
            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" name="username" required autofocus
              class="w-full pl-10 pr-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:border-yellow-500 focus:outline-none text-sm"
              placeholder="admin">
          </div>
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-2">Mot de passe</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="password" name="password" required
              class="w-full pl-10 pr-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:border-yellow-500 focus:outline-none text-sm"
              placeholder="••••••••">
          </div>
        </div>
        <button type="submit" class="w-full py-3 rounded-xl font-bold text-gray-900 text-sm mt-2"
          style="background: linear-gradient(135deg, #D4AF37, #C9A227);">
          <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="{% url 'home' %}" class="text-gray-500 hover:text-gray-300 text-sm transition-colors">
          <i class="fas fa-arrow-left mr-1"></i>Retour au site
        </a>
      </div>
    </div>
  </div>
</body>
</html>
